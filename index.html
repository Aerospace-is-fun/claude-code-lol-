<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 2026 Timetable</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e0e0dc; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  header .usyd { font-size: 12px; color: #888; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 57px); }

  .sidebar { background: #fff; border-right: 1px solid #e0e0dc; padding: 20px 16px; overflow-y: auto; }
  .sidebar h2 { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }

  .subject-card { border: 1px solid #e8e8e4; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .subject-header { padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; user-select: none; }
  .subject-header:hover { background: #fafaf8; }
  .subj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .subj-info { flex: 1; }
  .subj-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .subj-code { font-size: 11px; color: #999; margin-top: 2px; }
  .chevron { font-size: 12px; color: #bbb; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
  .subject-card.open .chevron { transform: rotate(180deg); }

  .class-options { display: none; border-top: 1px solid #f0f0ec; padding: 8px 12px 10px; }
  .subject-card.open .class-options { display: block; }
  .option-group { margin-bottom: 8px; }
  .option-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .option-btn { display: block; width: 100%; text-align: left; background: none; border: 1px solid #e8e8e4; border-radius: 7px; padding: 6px 9px; font-size: 12px; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; color: #444; line-height: 1.4; }
  .option-btn:hover { border-color: #ccc; background: #fafaf8; }
  .option-btn.selected { color: #fff; border-color: transparent; }
  .option-btn .opt-time { font-weight: 600; }
  .option-btn .opt-loc { font-size: 11px; opacity: 0.8; margin-top: 1px; }

  .legend-note { font-size: 11px; color: #bbb; margin-top: 4px; }

  .main { padding: 20px; overflow-x: auto; }
  .grid-wrap { background: #fff; border: 1px solid #e0e0dc; border-radius: 12px; overflow: hidden; min-width: 680px; }

  .day-header { display: grid; grid-template-columns: 54px repeat(5, 1fr); border-bottom: 1px solid #e0e0dc; }
  .day-header > div { padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-header > div:first-child { border-right: 1px solid #f0f0ec; }

  .time-grid { display: grid; grid-template-columns: 54px repeat(5, 1fr); position: relative; }
  .time-col { border-right: 1px solid #f0f0ec; }
  .time-slot { height: 44px; border-bottom: 1px solid #f7f7f5; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 10px; color: #ccc; font-variant-numeric: tabular-nums; }
  .time-slot.hour { color: #aaa; border-bottom-color: #eeeeea; }

  .day-col { border-right: 1px solid #f0f0ec; position: relative; }
  .day-col:last-child { border-right: none; }
  .day-bg-slot { height: 44px; border-bottom: 1px solid #f7f7f5; }
  .day-bg-slot.hour { border-bottom-color: #eeeeea; }

  .event-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  .event { position: absolute; left: 3px; right: 3px; border-radius: 7px; padding: 5px 7px; font-size: 11px; line-height: 1.3; overflow: hidden; pointer-events: all; cursor: default; border: none; }
  .event .ev-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event .ev-type { opacity: 0.75; font-size: 10px; margin-top: 1px; }
  .event .ev-loc { opacity: 0.65; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .empty-hint { grid-column: 1 / -1; text-align: center; padding: 48px 0; color: #ccc; font-size: 13px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid #e0e0dc; }
  }
</style>
</head>
<body>

<header>
  <h1>S2 2026 Timetable</h1>
  <span class="usyd">University of Sydney</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <h2>Subjects</h2>
    <div id="subject-list"></div>
    <p class="legend-note" style="margin-top:8px;">Select class options to build your timetable.</p>
  </aside>

  <main class="main">
    <div class="grid-wrap">
      <div class="day-header">
        <div></div>
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
      </div>
      <div class="time-grid" id="time-grid">
        <div class="time-col" id="time-col"></div>
        <div class="day-col" id="col-Mon"><div class="event-layer" id="layer-Mon"></div></div>
        <div class="day-col" id="col-Tue"><div class="event-layer" id="layer-Tue"></div></div>
        <div class="day-col" id="col-Wed"><div class="event-layer" id="layer-Wed"></div></div>
        <div class="day-col" id="col-Thu"><div class="event-layer" id="layer-Thu"></div></div>
        <div class="day-col" id="col-Fri"><div class="event-layer" id="layer-Fri"></div></div>
      </div>
    </div>
  </main>
</div>

        ]
      },
      {

        required: false,
        options: [
          { id: "aero2705-tut-01", label: "Thu 13:00", day: "Thu", time: "13:00", dur: 2, loc: "Mech Eng Comp Lab S345" }
        ]
      }
    ]
  },
  {
    code: "AMME2200",
    name: "Introductory Thermofluids",
    color: "#E05A2B",
    groups: [
      {
        type: "Lecture 1",
        required: true,
        options: [
          { id: "amme2200-lec1-01", label: "Tue 11:00", day: "Tue", time: "11:00", dur: 1, loc: "PNR LT 302" }
        ]

          { id: "amme2200-tut-04p1", label: "Tue 17:00 (04-P1)", day: "Tue", time: "17:00", dur: 1, loc: "Mech Eng S226" },
          { id: "amme2200-tut-06p1", label: "Wed 08:00 (06-P1)", day: "Wed", time: "08:00", dur: 1, loc: "Mech Eng S227" },
          { id: "amme2200-tut-07p1", label: "Wed 14:00 (07-P1)", day: "Wed", time: "14:00", dur: 1, loc: "BHB 1080" },
          { id: "amme2200-tut-09p1", label: "Wed 15:00 (09-P1)", day: "Wed", time: "15:00", dur: 1, loc: "Civil Eng S311" },
          { id: "amme2200-tut-10p1", label: "Wed 16:00 (10-P1)", day: "Wed", time: "16:00", dur: 1, loc: "Chem Eng LT 201" }
        ]

          { id: "amme2200-tut-01p2", label: "Thu 08:00 (01-P2)", day: "Thu", time: "08:00", dur: 1, loc: "Mech Eng S227" },
          { id: "amme2200-tut-02p2", label: "Thu 09:00 (02-P2)", day: "Thu", time: "09:00", dur: 1, loc: "Mech Eng S227" },
          { id: "amme2200-tut-03p2", label: "Thu 10:00 (03-P2)", day: "Thu", time: "10:00", dur: 1, loc: "Aero Eng N214" },
          { id: "amme2200-tut-06p2", label: "Fri 09:00 (06-P2)", day: "Fri", time: "09:00", dur: 1, loc: "BHB 2240" },
          { id: "amme2200-tut-08p2", label: "Fri 08:00 (08-P2)", day: "Fri", time: "08:00", dur: 1, loc: "BHB 2240" },
          { id: "amme2200-tut-09p2", label: "Fri 10:00 (09-P2)", day: "Fri", time: "10:00", dur: 1, loc: "Storie Dixson 332" },
          { id: "amme2200-tut-10p2", label: "Fri 13:00 (10-P2)", day: "Fri", time: "13:00", dur: 1, loc: "Civil Eng S311" }
        ]
      }
    ]
  },
  {
    code: "AMME2301",
    name: "Mechanics of Solids",
    color: "#2BA89A",
    groups: [
      {
        type: "Lecture 1",
        required: true,
        options: [
          { id: "amme2301-lec1-01", label: "Tue 14:00", day: "Tue", time: "14:00", dur: 2, loc: "BHB LT B2010" }
        ]
      },
      {
        type: "Lecture 2",
        required: true,
        options: [
          { id: "amme2301-lec2-01", label: "Wed 12:00", day: "Wed", time: "12:00", dur: 1, loc: "BHB LT B2010" }
        ]
      },
      {
        type: "Tutorial",
        required: false,
        options: [
          { id: "amme2301-tut-01", label: "Mon 13:00 (Tut 01)", day: "Mon", time: "13:00", dur: 2, loc: "Mech Eng S220" },
          { id: "amme2301-tut-02", label: "Mon 13:00 (Tut 02)", day: "Mon", time: "13:00", dur: 2, loc: "BHB 2060" },
          { id: "amme2301-tut-03", label: "Tue 16:00 (Tut 03)", day: "Tue", time: "16:00", dur: 2, loc: "Mech Eng S227" },
          { id: "amme2301-tut-04", label: "Tue 16:00 (Tut 04)", day: "Tue", time: "16:00", dur: 2, loc: "Aero Eng N311" },
          { id: "amme2301-tut-05", label: "Wed 14:00 (Tut 05)", day: "Wed", time: "14:00", dur: 2, loc: "Mech Eng S226" },
          { id: "amme2301-tut-06", label: "Wed 16:00 (Tut 06)", day: "Wed", time: "16:00", dur: 2, loc: "BHB 3270" },
          { id: "amme2301-tut-08", label: "Thu 09:00 (Tut 08)", day: "Thu", time: "09:00", dur: 2, loc: "Aero Eng N311" },
          { id: "amme2301-tut-10", label: "Thu 11:00 (Tut 10)", day: "Thu", time: "11:00", dur: 2, loc: "Mech Eng S220" },
          { id: "amme2301-tut-11", label: "Thu 14:00 (Tut 11)", day: "Thu", time: "14:00", dur: 2, loc: "Mech Eng S227" },
          { id: "amme2301-tut-14", label: "Fri 09:00 (Tut 14)", day: "Fri", time: "09:00", dur: 2, loc: "School of IT LT" },
          { id: "amme2301-tut-15", label: "Fri 12:00 (Tut 15)", day: "Fri", time: "12:00", dur: 2, loc: "Aero Eng N214" },
          { id: "amme2301-tut-16", label: "Fri 14:00 (Tut 16)", day: "Fri", time: "14:00", dur: 2, loc: "Institute N296" }
        ]
      }
    ]
  }
];

const DAYS = ["Mon","Tue","Wed","Thu","Fri"];
let selected = {};

function timeToSlot(t) {
  const [h, m] = t.split(":").map(Number);
  return (h - START_HOUR) * 2 + (m >= 30 ? 1 : 0);
}

function buildTimeCol() {
  const col = document.getElementById("time-col");
  col.innerHTML = "";
  for (let s = 0; s < TOTAL_SLOTS; s++) {
    const h = START_HOUR + Math.floor(s / 2);
    const m = s % 2 === 0 ? "00" : "30";
    const div = document.createElement("div");
    div.className = "time-slot" + (m === "00" ? " hour" : "");
    div.textContent = m === "00" ? `${h}:00` : "";
    col.appendChild(div);
  }
}

function buildDayBg() {
  DAYS.forEach(d => {
    const col = document.getElementById("col-" + d);
    const layer = document.getElementById("layer-" + d);
    col.innerHTML = "";
    col.appendChild(layer);
    for (let s = 0; s < TOTAL_SLOTS; s++) {
      const div = document.createElement("div");
      div.className = "day-bg-slot" + (s % 2 === 0 ? " hour" : "");
      col.insertBefore(div, layer);
    }
  });
}

function renderEvents() {
  DAYS.forEach(d => {
    const layer = document.getElementById("layer-" + d);
    layer.innerHTML = "";
  });

  Object.values(selected).forEach(ev => {
    if (!ev) return;
    const layer = document.getElementById("layer-" + ev.day);
    if (!layer) return;
    const slot = timeToSlot(ev.time);
    const top = slot * SLOT_HEIGHT + 1;
    const height = ev.dur * 2 * SLOT_HEIGHT - 3;
    const subj = SUBJECTS.find(s => s.groups.some(g => g.options.some(o => o.id === ev.id)));
    const color = subj ? subj.color : "#666";
    const div = document.createElement("div");
    div.className = "event";
    div.style.cssText = `top:${top}px;height:${height}px;background:${color}18;border-left:3px solid ${color};`;
    div.innerHTML = `<div class="ev-name" style="color:${color}">${subj ? subj.code : ""}</div><div class="ev-type" style="color:${color}">${ev.type}</div><div class="ev-loc" style="color:${color}">${ev.loc}</div>`;
    layer.appendChild(div);
  });
}

function buildSidebar() {
  const list = document.getElementById("subject-list");
  list.innerHTML = "";

  SUBJECTS.forEach(subj => {
    const card = document.createElement("div");
    card.className = "subject-card open";
    card.innerHTML = `
      <div class="subject-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="subj-dot" style="background:${subj.color}"></div>
        <div class="subj-info">
          <div class="subj-name">${subj.name}</div>
          <div class="subj-code">${subj.code}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="class-options" id="opts-${subj.code}"></div>
    `;
    list.appendChild(card);

    const opts = document.getElementById("opts-" + subj.code);
    subj.groups.forEach((grp, gi) => {
      const grpKey = subj.code + "-" + gi;
      const div = document.createElement("div");
      div.className = "option-group";
      div.innerHTML = `<div class="option-label">${grp.type}</div>`;

      grp.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.dataset.key = grpKey;
        btn.dataset.id = opt.id;
        btn.innerHTML = `<div class="opt-time">${opt.label}</div><div class="opt-loc">${opt.loc}</div>`;
        btn.onclick = () => toggleOption(grpKey, opt, btn, subj.color);
        div.appendChild(btn);
      });

      opts.appendChild(div);
    });
  });
}

function toggleOption(grpKey, opt, btn, color) {
  const buttons = document.querySelectorAll(`[data-key="${grpKey}"]`);
  if (selected[grpKey] && selected[grpKey].id === opt.id) {
    selected[grpKey] = null;
    btn.classList.remove("selected");
    btn.style.background = "";
  } else {
    buttons.forEach(b => { b.classList.remove("selected"); b.style.background = ""; });
    selected[grpKey] = { ...opt };
    btn.classList.add("selected");
    btn.style.background = color;
    btn.style.color = "#fff";
  }
  renderEvents();
}

buildTimeCol();
buildDayBg();
buildSidebar();
renderEvents();
</script>
</body>
</html>
